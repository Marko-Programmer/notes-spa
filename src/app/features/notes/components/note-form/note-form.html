<form class="form custom-form" [formGroup]="noteForm" (ngSubmit)="onSubmit()">
  <div class="form-group mb-3">
    <label>Title</label>
    <input type="text" class="form-control" formControlName="title">
  </div>

  <div class="form-group mb-3">
    <label>Content</label>
    <textarea class="form-control" rows="4" formControlName="content"></textarea>
  </div>

  <div class="form-group mb-4">
    <label>Priority</label>
    <select class="form-select" formControlName="priority">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
  </div>

  <div class="actions d-flex gap-2">
    <button class="btn-primary-custom" type="submit" [disabled]="noteForm.invalid">
      {{ status === 'create' ? 'Create Note' : 'Save Changes' }}
    </button>
    <button type="button" class="btn-secondary-custom" routerLink="/notes">Cancel</button>
  </div>
</form>
